databases:
  - name: anki-postgres
    plan: free
    databaseName: anki
    user: anki

services:
  - type: web
    name: anki-api
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: artifacts/api-server/Dockerfile
    dockerContext: .
    healthCheckPath: /api/healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: anki-postgres
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false

  - type: web
    name: anki-web
    runtime: static
    plan: free
    region: oregon
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/anki-generator run build
    staticPublishPath: artifacts/anki-generator/dist/public
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 24.0.0
      - key: BASE_PATH
        value: /
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
